<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenManus ウェブUI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="text-center my-4">
            <h1>OpenManus ウェブUI</h1>
            <p class="lead">AIエージェントとのインタラクション</p>
            <div class="mt-3">
                <a href="/" class="btn btn-outline-primary me-2">メインページ</a>
                <a href="/search" class="btn btn-outline-success">ウェブ検索</a>
            </div>
        </header>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">タスクを送信</h2>
                    </div>
                    <div class="card-body">
                        <form id="taskForm">
                            <div class="mb-3">
                                <label for="taskInput" class="form-label">実行したいタスクを入力してください</label>
                                <textarea id="taskInput" class="form-control" rows="5" placeholder="タスクを入力..."></textarea>
                            </div>
                            <div class="alert alert-info">
                                <small>※ タスクの実行には数秒かかる場合があります。エラーが表示された場合は再度お試しください。</small>
                            </div>
                            <button type="submit" class="btn btn-primary" id="submitBtn">タスクを実行</button>
                        </form>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">タスクの状態</h2>
                    </div>
                    <div class="card-body">
                        <div id="statusContainer">
                            <p>状態: <span id="taskStatus">待機中</span></p>
                            <p>現在のタスク: <span id="currentTask">なし</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">タスク結果</h2>
                    </div>
                    <div class="card-body">
                        <div id="resultContainer">
                            <p id="noResults">結果はありません</p>
                            <div id="resultContent"></div>
                        </div>
                    </div>
                </div>
                
                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">スクリーンショット</h2>
                    </div>
                    <div class="card-body">
                        <div id="screenshotsContainer" class="text-center">
                            <p id="noScreenshots">スクリーンショットはありません</p>
                            <div id="screenshotsList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
