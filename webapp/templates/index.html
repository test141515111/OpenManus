<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenManus ウェブUI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="text-center my-4">
            <h1>OpenManus ウェブUI</h1>
            <p class="lead">ブラウザ機能を持つAIエージェント</p>
            <div class="mt-3">
                <a href="/" class="btn btn-outline-primary me-2">メインページ</a>
                <a href="/search" class="btn btn-outline-success">ウェブ検索</a>
            </div>
        </header>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">タスクを送信</h2>
                    </div>
                    <div class="card-body">
                        <form id="taskForm">
                            <div class="mb-3">
                                <label for="taskInput" class="form-label">OpenManusに何をさせたいですか？</label>
                                <textarea id="taskInput" class="form-control" rows="3" placeholder="タスクや質問をここに入力してください..."></textarea>
                            </div>
                            <div class="mb-3">
                                <button type="button" class="btn btn-outline-secondary me-2" id="sampleBtn">サンプル: モテる方法を教えて</button>
                            </div>
                            <button type="submit" class="btn btn-primary" id="submitBtn">タスクを送信</button>
                        </form>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">タスクの状態</h2>
                    </div>
                    <div class="card-body">
                        <p>状態: <span id="status">待機中</span></p>
                        <p>現在のタスク: <span id="currentTask">なし</span></p>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">ブラウザのスクリーンショット</h2>
                    </div>
                    <div class="card-body">
                        <div id="screenshotsContainer">
                            <p id="noScreenshots">スクリーンショットはありません</p>
                            <div id="screenshotsList"></div>
                        </div>
                    </div>
                </div>
                
                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">ブラウザの動画</h2>
                    </div>
                    <div class="card-body">
                        <div id="videoContainer">
                            <p id="noVideo">動画はありません</p>
                            <video id="videoElement" controls style="display: none; width: 100%;"></video>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="card-title h5">タスクの結果</h2>
                    </div>
                    <div class="card-body">
                        <pre id="resultContent">結果はありません</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
